<!DOCTYPE html>
<html>
<head>

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover
">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

  
.header{
display:flex;
align-items:center;
justify-content:center;
padding-top:30px;
padding-bottom:6px;
margin-top:00px;
}

.logoGif{
width:120px;
height:auto;
object-fit:contain;
display:block;
image-rendering:auto;
will-change:transform;
}

#reader{
width:340px;
height:160px;
margin-top:10px;
border-radius:20px;
overflow:hidden;
border:3px solid #333;
background:black;
}

.cameraControls{
display:flex;
gap:14px;
margin-top:8px;
margin-bottom:-30px;
justify-content:center;
}

.cameraControls button{
width:70px;
height:70px;
font-size:28px;
border-radius:50%;
border:none;
background:#333;
color:white;
font-weight:bold;
}

.controls{
padding:20px;
width:100%;
max-width:420px;
}

button{
font-size:22px;
padding:15px;
margin:5px;
width:170px;
border:none;
border-radius:14px;
font-weight:bold;
color:white;
}

.outBtn{
background:#ff9800;
}

.inBtn{
background:#4caf50;
}

#status{
font-size:24px;
padding:0px;
min-height:60px;
font-weight:bold;
line-height:1.4;
white-space:normal;
}

.modeText{
font-size:18px;
opacity:0.8;
margin-top:10px;
}
select,
input{
width:90%;
max-width:360px;
padding:10px 14px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:14px;
outline:none;
}

html,
body{
touch-action:manipulation;
-webkit-text-size-adjust:none;
}

*{
box-sizing:border-box;
}

#comment{
margin-bottom:10px;
}
</style>


<meta charset="UTF-8">

<title>SoundBoxBaza</title>

<link rel="apple-touch-icon" href="icon.png">
</head>

<body>
<div class="header">

<img
src="./logo.gif"
class="logoGif"
alt="logo"
>

</div>

<div id="reader"></div>

<div class="cameraControls">

<button onclick="zoomOut()">
➖
</button>

<button onclick="toggleTorch()">
🔦
</button>

<button onclick="zoomIn()">
➕
</button>

</div>

<div class="controls">

<div class="modeText" id="modeText">
Режим: Выдача
</div>

<select id="employee">

<option value="">
Сотрудник
</option>

<option value="Roman">
Roman
</option>

<option value="Alex">
Alex
</option>

<option value="Admin">
Admin
</option>

</select>

<input
id="comment"
placeholder="Комментарий"
/>

<button class="outBtn" onclick="setMode('OUT')">
Выдача
</button>

<button class="inBtn" onclick="setMode('IN')">
Прием
</button>

<div id="status">
Готов к сканированию
</div>

</div>

<script>

let mode = "OUT";

let lastScanTimes = {};

let currentTrack = null;

let currentZoom = 2;

let torchEnabled = false;

function setMode(newMode){

mode = newMode;

document.getElementById("modeText").innerText =
mode === "OUT"
? "Режим: Выдача"
: "Режим: Прием";

navigator.vibrate?.(50);

}

async function zoomIn(){

if(!currentTrack) return;

currentZoom += 0.5;

if(currentZoom > 5){
currentZoom = 5;
}

applyZoom();

}

async function zoomOut(){

if(!currentTrack) return;

currentZoom -= 0.5;

if(currentZoom < 1){
currentZoom = 1;
}

applyZoom();

}

async function applyZoom(){

try{

await currentTrack.applyConstraints({
advanced: [{
zoom: currentZoom
}]
});

}catch(e){

console.log("Zoom error", e);

}

}

async function toggleTorch(){

if(!currentTrack) return;

try{

torchEnabled = !torchEnabled;

await currentTrack.applyConstraints({
advanced: [{
torch: torchEnabled
}]
});

}catch(e){

console.log("Torch error", e);

}

}

async function onScanSuccess(decodedText){
const employee =
document.getElementById("employee").value;

if(employee == ""){

document.getElementById("status")
.innerHTML =
"⚠️ Выберите сотрудника";

navigator.vibrate?.([100,80,100]);

return;

}
const now = Date.now();

if(
lastScanTimes[decodedText] &&
now - lastScanTimes[decodedText] < 2000
){
return;
}

lastScanTimes[decodedText] = now;

navigator.vibrate?.(100);

const statusElement =
document.getElementById("status");

statusElement.innerHTML =
"⏳ Проверка...";

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbxtnvaiS8mhgR6vBqsLAEBCn945bMll0q4od6C6cEMyhbq3c4vPmxNnaJJ4sEOOdP8/exec",
{
method: "POST",
headers:{
"Content-Type":"text/plain"
},
body: JSON.stringify({
mode: mode,
code: decodedText,
employee:
document.getElementById("employee").value,
comment:
document.getElementById("comment").value
})
}
);

const result = await response.text();

statusElement.innerHTML =
result.replace(/\n/g,"<br>");

}catch(e){

statusElement.innerHTML =
"⚠️ Ошибка соединения";

}

setTimeout(() => {

statusElement.innerHTML =
"Готов к сканированию";

document.getElementById("comment")
.value = "";

}, 2500);

}
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{
facingMode: "environment"
},
{
fps: 10
},
onScanSuccess
).then(() => {

console.log("Scanner started");

setTimeout(() => {

try{

const video =
document.querySelector("#reader video");

if(!video){
return;
}

const stream =
video.srcObject;

if(!stream){
return;
}

const tracks =
stream.getVideoTracks();

if(!tracks.length){
return;
}

currentTrack = tracks[0];

console.log("Track ready");

}catch(e){

console.log("Track error", e);

}

}, 1500);

});

</script>

</body>
</html>
