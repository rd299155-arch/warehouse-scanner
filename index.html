<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.header{
font-size:28px;
font-weight:bold;
padding-top:20px;
padding-bottom:10px;
}

#reader{
width:320px;
height:320px;
margin-top:10px;
border-radius:20px;
overflow:hidden;
border:3px solid #333;
background:black;
}

.controls{
padding:20px;
width:100%;
max-width:420px;
}

button{
font-size:22px;
padding:15px;
margin:10px;
width:170px;
border:none;
border-radius:14px;
font-weight:bold;
color:white;
}

.outBtn{
background:#ff9800;
}

.inBtn{
background:#4caf50;
}

#status{
font-size:24px;
padding:15px;
min-height:60px;
font-weight:bold;
}

.modeText{
font-size:18px;
opacity:0.8;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
Warehouse Scanner
</div>

<div id="reader"></div>

<div class="controls">

<div class="modeText" id="modeText">
Режим: Выдача
</div>

<button class="outBtn" onclick="setMode('OUT')">
Выдача
</button>

<button class="inBtn" onclick="setMode('IN')">
Прием
</button>

<div id="status">
Готов к сканированию
</div>

</div>

<script>

let mode = "OUT";

let lastScanTimes = {};

function setMode(newMode){

mode = newMode;

document.getElementById("modeText").innerText =
mode === "OUT"
? "Режим: Выдача"
: "Режим: Прием";

navigator.vibrate?.(50);

}

async function onScanSuccess(decodedText){

const now = Date.now();

if(
lastScanTimes[decodedText] &&
now - lastScanTimes[decodedText] < 2000
){
return;
}

lastScanTimes[decodedText] = now;

navigator.vibrate?.(100);

document.getElementById("status").innerText =
(mode === "OUT"
? "Выдача: "
: "Прием: ")
+ decodedText;

try{

await fetch(
"https://script.google.com/macros/s/AKfycbxS6NirNlFbeitnfQOSaO1h9_SN3ZgSrjMcRx1p3oyn0Un9xr5_THMZ3E9sYAzR2qg/exec",
{
method: "POST",
body: JSON.stringify({
mode: mode,
code: decodedText
})
}
);

}catch(e){

document.getElementById("status").innerText =
"⚠️ Ошибка соединения";

}

setTimeout(() => {

document.getElementById("status").innerText =
"Готов к сканированию";

}, 1200);

}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: 250
},
onScanSuccess
);

</script>

</body>
</html>
